<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" role="img" aria-label="Anatomy of the VSCode window: activity bar, file explorer, editor, integrated terminal, and the WSL: Ubuntu indicator in the bottom-left status bar.">
  <style>
    .bg          { fill: #1d2230; }
    .window      { fill: #0f1115; stroke: #2a3040; stroke-width: 1; }
    .titlebar    { fill: #161922; }
    .activity    { fill: #14171f; }
    .sidebar     { fill: #161922; }
    .editor      { fill: #0a0c12; }
    .terminal    { fill: #08090d; }
    .statusbar   { fill: #161922; }
    .badge-accent{ fill: #d97757; }
    .accent      { fill: #d97757; }
    .icon        { fill: #7a8294; }
    .icon-active { fill: #e7eaf0; }
    .text        { fill: #e7eaf0; font-family: -apple-system, "Segoe UI", Roboto, sans-serif; }
    .text-dim    { fill: #aab1c0; font-family: -apple-system, "Segoe UI", Roboto, sans-serif; }
    .text-mute   { fill: #7a8294; font-family: -apple-system, "Segoe UI", Roboto, sans-serif; }
    .mono        { font-family: ui-monospace, Menlo, Consolas, monospace; }
    .annot       { fill: #d97757; font-family: -apple-system, "Segoe UI", Roboto, sans-serif; font-size: 11px; font-weight: 700; letter-spacing: 0.5px; text-transform: uppercase; }
    .annot-line  { stroke: #d97757; stroke-width: 1; fill: none; }
    .small       { font-size: 11px; }
    .body        { font-size: 12px; }
  </style>

  <rect class="bg" x="0" y="0" width="800" height="500" rx="10" />

  <!-- VSCode window -->
  <rect class="window" x="40" y="40" width="720" height="380" rx="8" />

  <!-- Title bar -->
  <rect class="titlebar" x="40" y="40" width="720" height="28" rx="8" />
  <rect class="titlebar" x="40" y="60" width="720" height="8" />
  <text class="text-dim body" x="400" y="58" text-anchor="middle">GenAI101 — Visual Studio Code</text>

  <!-- Activity bar (left strip) -->
  <rect class="activity" x="40" y="68" width="44" height="324" />
  <rect class="icon" x="56" y="84" width="14" height="14" rx="2" />
  <rect class="icon-active" x="56" y="112" width="14" height="14" rx="2" />
  <rect class="icon" x="56" y="140" width="14" height="14" rx="2" />
  <rect class="icon" x="56" y="168" width="14" height="14" rx="2" />
  <rect class="icon" x="56" y="196" width="14" height="14" rx="2" />

  <!-- Sidebar / Explorer -->
  <rect class="sidebar" x="84" y="68" width="180" height="324" />
  <text class="text-mute small" x="98" y="90">EXPLORER</text>
  <text class="text body" x="98" y="116">▸ .devcontainer</text>
  <text class="text body" x="98" y="138">▾ assets</text>
  <text class="text-dim body" x="116" y="158">▸ css</text>
  <text class="text-dim body" x="116" y="178">▸ js</text>
  <text class="text body" x="98" y="200">▸ lessons</text>
  <text class="text body" x="98" y="222">▸ tracker</text>
  <text class="accent body" x="98" y="244">  hello.py</text>
  <text class="text body" x="98" y="266">  index.html</text>
  <text class="text body" x="98" y="288">  README.md</text>

  <!-- Editor area -->
  <rect class="editor" x="264" y="68" width="496" height="200" />
  <!-- tab -->
  <rect class="titlebar" x="264" y="68" width="120" height="26" />
  <rect class="editor"   x="264" y="92" width="120" height="2" />
  <text class="text body" x="280" y="86">hello.py</text>
  <text class="text-mute body" x="368" y="86">×</text>

  <!-- code lines -->
  <text class="text-mute mono small" x="280" y="120">1</text>
  <text class="text mono body" x="306" y="120"><tspan fill="#aab1c0">def</tspan> <tspan fill="#d97757">greet</tspan>(name):</text>
  <text class="text-mute mono small" x="280" y="142">2</text>
  <text class="text mono body" x="306" y="142">    <tspan fill="#aab1c0">return</tspan> f"Hello, {name}"</text>
  <text class="text-mute mono small" x="280" y="164">3</text>
  <text class="text-mute mono small" x="280" y="186">4</text>
  <text class="text mono body" x="306" y="186"><tspan fill="#aab1c0">print</tspan>(greet(<tspan fill="#4ade80">"Riley"</tspan>))</text>

  <!-- Terminal panel -->
  <rect class="terminal" x="264" y="268" width="496" height="124" />
  <rect class="titlebar" x="264" y="268" width="496" height="22" />
  <text class="text-dim small" x="278" y="284">PROBLEMS    OUTPUT    DEBUG CONSOLE    TERMINAL</text>
  <text class="accent mono small" x="278" y="312">$ python hello.py</text>
  <text class="text mono small" x="278" y="332">Hello, Riley</text>
  <text class="accent mono small" x="278" y="356">$ </text>
  <rect class="text" x="292" y="348" width="7" height="12" />

  <!-- Status bar -->
  <rect class="statusbar" x="40" y="392" width="720" height="28" rx="0" />
  <rect class="statusbar" x="40" y="412" width="720" height="8" />
  <rect class="badge-accent" x="48" y="398" width="118" height="20" rx="4" />
  <text class="text mono small" x="58" y="412" fill="#1a0f0a" font-weight="700">⇄  WSL: Ubuntu</text>
  <text class="text-dim small" x="180" y="411">main *</text>
  <text class="text-dim small" x="240" y="411">Python 3.11</text>
  <text class="text-dim small" x="700" y="411">Ln 4, Col 22</text>

  <!-- Annotations -->
  <text class="annot" x="40" y="455">Activity bar</text>
  <line class="annot-line" x1="62" y1="446" x2="62" y2="120" />
  <text class="annot" x="120" y="455">Explorer / files</text>
  <line class="annot-line" x1="174" y1="446" x2="174" y2="180" />
  <text class="annot" x="280" y="475">Editor</text>
  <line class="annot-line" x1="320" y1="466" x2="500" y2="170" />
  <text class="annot" x="380" y="475">Integrated terminal</text>
  <line class="annot-line" x1="480" y1="466" x2="500" y2="330" />
  <text class="annot" x="560" y="475">WSL: Ubuntu indicator — proves your editor is wired into Linux</text>
  <line class="annot-line" x1="570" y1="466" x2="110" y2="420" />
</svg>
