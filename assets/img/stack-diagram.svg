<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 380" role="img" aria-label="A real app is made of four categories: Language, Library, Framework, and Tool — shown for CVstomize.com">
  <style>
    .bg     { fill: #1d2230; }
    .card   { fill: #161922; stroke: #2a3040; stroke-width: 1; }
    .chip   { fill: #0f1115; stroke: #2a3040; stroke-width: 1; }
    .accent { fill: #d97757; }
    .accent-soft { fill: rgba(217,119,87,0.16); stroke: #d97757; }
    .text       { fill: #e7eaf0; font-family: -apple-system, "Segoe UI", Roboto, sans-serif; }
    .text-dim   { fill: #aab1c0; font-family: -apple-system, "Segoe UI", Roboto, sans-serif; }
    .text-mute  { fill: #7a8294; font-family: -apple-system, "Segoe UI", Roboto, sans-serif; }
    .label-mono { fill: #d97757; font-family: ui-monospace, Menlo, Consolas, monospace; }
    .title  { font-size: 16px; font-weight: 700; }
    .header { font-size: 13px; font-weight: 700; letter-spacing: 0.6px; text-transform: uppercase; }
    .body   { font-size: 13px; }
    .small  { font-size: 12px; }
  </style>

  <rect class="bg" x="0" y="0" width="760" height="380" rx="10" />

  <!-- header strip -->
  <rect class="accent-soft" x="20" y="20" width="720" height="46" rx="8" />
  <text class="text title" x="36" y="49">CVstomize.com</text>
  <text class="text-dim small" x="180" y="49">one app — four kinds of stuff under the hood</text>

  <!-- four columns -->
  <!-- Language -->
  <rect class="card" x="20" y="86" width="170" height="260" rx="8" />
  <text class="label-mono header" x="36" y="112">LANGUAGE</text>
  <text class="text-mute small" x="36" y="130">grammar &amp; rules</text>
  <rect class="chip" x="36" y="148" width="138" height="32" rx="6" />
  <text class="text body" x="50" y="169">JavaScript</text>
  <rect class="chip" x="36" y="188" width="138" height="32" rx="6" />
  <text class="text body" x="50" y="209">(backend lang)</text>

  <!-- Framework -->
  <rect class="card" x="200" y="86" width="170" height="260" rx="8" />
  <text class="label-mono header" x="216" y="112">FRAMEWORK</text>
  <text class="text-mute small" x="216" y="130">shape of the app</text>
  <rect class="chip" x="216" y="148" width="138" height="32" rx="6" />
  <text class="text body" x="230" y="169">React</text>
  <text class="text-mute small" x="216" y="206">it calls your code</text>

  <!-- Library -->
  <rect class="card" x="380" y="86" width="170" height="260" rx="8" />
  <text class="label-mono header" x="396" y="112">LIBRARY</text>
  <text class="text-mute small" x="396" y="130">you call it when needed</text>
  <rect class="chip" x="396" y="148" width="138" height="32" rx="6" />
  <text class="text body" x="410" y="169">Material-UI</text>
  <text class="text-mute small" x="396" y="206">pre-built UI pieces</text>

  <!-- Tool -->
  <rect class="card" x="560" y="86" width="180" height="260" rx="8" />
  <text class="label-mono header" x="576" y="112">TOOL</text>
  <text class="text-mute small" x="576" y="130">around the app, not in it</text>
  <rect class="chip" x="576" y="148" width="148" height="28" rx="6" />
  <text class="text body" x="588" y="167">GCP Cloud Run</text>
  <rect class="chip" x="576" y="184" width="148" height="28" rx="6" />
  <text class="text body" x="588" y="203">Firebase Auth</text>
  <rect class="chip" x="576" y="220" width="148" height="28" rx="6" />
  <text class="text body" x="588" y="239">Docker</text>
  <rect class="chip" x="576" y="256" width="148" height="28" rx="6" />
  <text class="text body" x="588" y="275">Gemini 2.5 (AI)</text>

  <!-- bottom note -->
  <text class="text-dim small" x="380" y="370" text-anchor="middle">every real app mixes all four — don't memorize, just notice</text>
</svg>
